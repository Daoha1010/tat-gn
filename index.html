async function sbReq(method,path,body){
  const h={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(method==='POST')h['Prefer']='resolution=merge-duplicates,return=minimal';
  if(method==='DELETE')h['Prefer']='return=minimal';
  try{
    const r=await fetch(SB_URL+'/rest/v1/'+path,{method,headers:h,body:body!=null?JSON.stringify(body):undefined});
    if(!r.ok){const e=await r.text();console.error('[Supa]',method,path,e.slice(0,300));return null;}
    if(r.status===204||method==='DELETE')return true;
    const txt=await r.text();return txt?JSON.parse(txt):[];
  }catch(e){console.error('[Supa] fetch error:',e);return null;}
}
async function sbGet(tbl,q=''){return await sbReq('GET',tbl+'?select=*'+(q?'&'+q:''));}
async function sbUpsert(tbl,rows){
  const arr=Array.isArray(rows)?rows:[rows];if(!arr.length)return;
  return await sbReq('POST',tbl,arr);
}
async function sbDel(tbl,id){return await sbReq('DELETE',tbl+'?id=eq.'+encodeURIComponent(id));}
// Track server IDs for deletion detection
let _sbState={users:new Set(),tasks:new Set(),docs:new Set(),notifs:new Set(),cfs:new Set()};
let _syncTimer=null;
async function doSupaSync(){
  _syncTimer=null;
  try{
    const tables=['users','tasks','docs','notifs','cfs'];
    for(const tbl of tables){
      const rows=db[tbl]||[];
      const currIds=new Set(rows.map(r=>r.id));
      if(rows.length)await sbUpsert(tbl,rows.map(r=>({id:r.id,data:r})));
      const dels=[..._sbState[tbl]].filter(id=>!currIds.has(id));
      for(const id of dels)await sbDel(tbl,id);
      _sbState[tbl]=currIds;
    }
    await sbUpsert('cfg',[{id:'main',data:db.cfg}]);

  ['users','docs','tasks','notifs','cfs'].forEach(k=>{if(!db[k])db[k]=[];});
  if(!db.cfg)db.cfg={gsheetsUrl:'',emailjsSvc:'',emailjsTpl:'',emailjsKey:''};
  for(const dd of DEF.docs){
    const ex=db.docs.find(d=>d.id===dd.id);
    if(!ex){db.docs.push(JSON.parse(JSON.stringify(dd)));sbUpsert('docs',[{id:dd.id,data:dd}]);}
    else if(ex.content!==dd.content){ex.content=dd.content;sbUpsert('docs',[{id:ex.id,data:ex}]);}
  }
  if(!db.users.find(u=>u.role==='admin')){
    const a={id:'admin_001',name:'Admin',phone:'0123456789',email:'admin@company.com',pw:'Admin@123',role:'admin',dept:'Management',position:'Admin',dob:'',stk:'',fl:false};
    db.users.push(a);sbUpsert('users',[{id:a.id,data:a}]);_sbState.users.add(a.id);
  }
  const _cut=new Date();_cut.setDate(_cut.getDate()-7);
  const _cutS=_cut.toISOString().split('T')[0];
  const stale=db.tasks.filter(t=>t.recurParent&&t.status!=='done'&&t.dl&&t.dl<_cutS);
  stale.forEach(t=>{db.tasks=db.tasks.filter(x=>x.id!==t.id);sbDel('tasks',t.id);});
}

function buildDonut(data,total){
  if(!total) return '<div style="text-align:center;color:var(--tx3);padding:36px 0;font-size:12px">Chưa có dữ liệu</div>';
  const R=52,cx=65,cy=65,circ=2*Math.PI*R;
  let cum=0;
  const arcs=data.map(d=>{
    const len=(d.count/total)*circ;
    if(!d.count){return '';}
    const da=`${len.toFixed(2)} ${(circ-len).toFixed(2)}`;
    const dof=(circ/4-cum).toFixed(2);
    cum+=len;
    return `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${d.color}" stroke-width="15" stroke-dasharray="${da}" stroke-dashoffset="${dof}"/>`;
  }).join('');
  return `<svg viewBox="0 0 130 130" style="width:120px;height:120px;flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#F1F5F9" stroke-width="15"/>
    ${arcs}
    <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="22" font-weight="800" fill="var(--tx)">${total}</text>
    <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="9" fill="var(--tx3)" letter-spacing="1">TASKS</text>
  </svg>`;
}

}
function getSpeedScore(uid){
  if(_scoreCache['p_'+uid])return _scoreCache['p_'+uid];
  // Tính điểm tốc độ từ cả task chính (PIC) lẫn subtask (hỗ trợ)
  const items=[];
  db.tasks.forEach(t=>{
    // Task chính: PIC
    if(t.asgn===uid&&t.status==='done'&&t.doneAt&&t.dl)
      items.push({dl:t.dl,doneAt:t.doneAt});
    // Subtask hỗ trợ
    (t.subtasks||[]).forEach(s=>{
      if(s.asgn===uid&&s.done&&s.doneAt&&s.dl)
        items.push({dl:s.dl,doneAt:s.doneAt});
    });
  });
  if(!items.length)return(_scoreCache['p_'+uid]={count:0,avgDays:null,early:0,late:0,onTime:0,bonus:0});
  let sum=0,early=0,late=0,onTime=0,bonus=0;
  items.forEach(i=>{
    const days=Math.round((new Date(i.dl)-new Date(i.doneAt))/(86400000));
    sum+=days;
    if(days>0){early++;bonus+=0.2;}          // hoàn thành sớm: +0.2⭐
    else if(days===0){onTime++;bonus+=0.1;}  // đúng hạn: +0.1⭐
    else if(days>=-3){late++;bonus-=0.3;}    // trễ 1-3 ngày: -0.3⭐
    else if(days>=-7){late++;bonus-=0.5;}    // trễ 4-7 ngày: -0.5⭐
    else{late++;bonus-=1;}                   // trễ 8+ ngày: -1⭐
  });
  bonus=Math.round(bonus*10)/10;
  return(_scoreCache['p_'+uid]={count:items.length,avgDays:+(sum/items.length).toFixed(1),early,late,onTime,bonus});
}

  if(_scoreCache['s_'+uid])return _scoreCache['s_'+uid];

}

function openDocView(did){
  const d=db.docs.find(d=>d.id===did);if(!d)return;

  openMod('doc','📑','Xem tài liệu',`<div class="dv">${d.content}</div>`,
    dn?`<span class="b b-ok">✓ Đã hoàn thành</span>`:
    `<button class="btn btn-s" onclick="closeMod()">Đóng</button><button class="btn btn-p" onclick="markDocDone('${did}')">✓ Đã đọc xong</button>`,true);

function markDocDone(did){
  const d=db.docs.find(d=>d.id===did);if(!d||d.done.includes(S.user.id))return;
  d.done.push(S.user.id);saveDB();
  db.tasks.filter(t=>t.reqDoc===did&&(t.asgn===S.user.id||t.pics?.includes(S.user.id))).forEach(t=>{addN(S.user.id,`🔓 Nhiệm vụ "${t.title}" đã được mở khóa!`,t.id);});
  addN(S.user.id,`📄 Đã hoàn thành tài liệu: "${d.title}"`,null,'docs');
  closeMod();renderDocs();
}

     <div class="fg"><label>Danh mục</label><input id="dc" value="${esc(d?.cat||'')}" placeholder="VD: Hành chính, IT, Nhân sự" /></div>

function saveDoc(did){
  const t=$('dt').value.trim(),cat=$('dc').value.trim(),co=$('dco').value.trim(),ty=$('dty')?.value||'other';
  if(!t){alert('Nhập tiêu đề');return;}
  const asgn=[...document.querySelectorAll('#m-body input[type=checkbox]:checked')].map(c=>c.value);
  if(did){const d=db.docs.find(d=>d.id===did);d.title=t;d.cat=cat;d.content=co;d.asgn=asgn;d.type=ty;}
  else db.docs.push({id:uid(),title:t,cat:cat||'Chung',type:ty,content:co,asgn,done:[]});
  saveDB();closeMod();renderDocs();
}
function delDoc(did){if(!confirm('Xóa tài liệu này?'))return;db.docs=db.docs.filter(d=>d.id!==did);saveDB();renderDocs();}

function setTV(v){
  S.tv=v;
  document.querySelectorAll('.tab[data-tv]').forEach(b=>b.classList.toggle('on',b.dataset.tv===v));
  renderTV();
}
function myTasks(sort='dl',fil='',q=''){
  const u=S.user;
  let ts=isAdm()?db.tasks:db.tasks.filter(t=>t.asgn===u.id||t.pics?.includes(u.id));
  if(fil==='todo')ts=ts.filter(t=>t.status==='todo');
  else if(fil==='inprogress')ts=ts.filter(t=>t.status==='inprogress');
  else if(fil==='done')ts=ts.filter(t=>t.status==='done');
  else if(fil==='ovd')ts=ts.filter(t=>isOvd(t.dl)&&t.status!=='done');
  if(q)ts=ts.filter(t=>t.title.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q));
  if(sort==='dl')ts.sort((a,b)=>new Date(a.dl)-new Date(b.dl));
  if(sort==='pri'){const o={high:0,medium:1,low:2};ts.sort((a,b)=>o[a.pri]-o[b.pri]);}
  return ts;
}
function renderTV(){
  const tv=$('tv');if(!tv)return;
  tv.innerHTML=S.tv==='list'?buildListHTML():S.tv==='kanban'?buildKanbanHTML():buildCalHTML();

}

function updSt(tid,st){
  const t=db.tasks.find(t=>t.id===tid);if(!t||isLocked(t))return;
  const prev=t.status;stampStatus(t,prev,st);t.status=st;
  const stLbl={todo:'📋 To-Do',inprogress:'⚡ Đang làm',done:'✅ Hoàn thành'};
  const actor=S.user.id;
  // Notify admin khi done
  if(st==='done'&&prev!=='done'){const adm=db.users.find(u=>u.role==='admin');if(adm)addN(adm.id,`✅ ${uName(t.asgn||actor)} hoàn thành: "${t.title}"`,tid);spawnRecur(t);}
  // Notify pics & asgn (trừ người vừa đổi) khi đổi trạng thái
  const toNotify=[t.asgn,...(t.pics||[])].filter(uid=>uid&&uid!==actor);
  toNotify.forEach(uid=>addN(uid,`🔄 "${t.title}" → ${stLbl[st]||st} (bởi ${uName(actor)})`,tid));
  saveDB();
  if(S.page==='tasks')renderTV();
}

// Ngày lễ cố định VN (tháng-ngày): note nhỏ dưới số ngày
const VN_HOL={'1-1':'🎊 Tết DL','4-30':'🕊️ 30/4','5-1':'💪 1/5','9-2':'🇻🇳 Quốc khánh','3-8':'💐 8/3','10-20':'🌸 PNVN','11-20':'📚 Ngày Nhà giáo'};
// Tết Nguyên Đán (năm → 'tháng/ngày' dương lịch ngày Mùng 1)
const VN_TET={'2024':'2/10','2025':'1/29','2026':'2/17','2027':'2/6','2028':'1/26','2029':'2/13'};
function getHoliday(day,month,year){
  const k=month+'-'+day;
  if(VN_HOL[k])return VN_HOL[k];
  const ts=VN_TET[year];
  if(ts){
    const[tm,td]=ts.split('/').map(Number);
    if(month===tm&&day===td)return'🧧 Mùng 1 Tết';
    const eve=new Date(year,tm-1,td-1);
    if(month===eve.getMonth()+1&&day===eve.getDate())return'🧨 Giao thừa';
    const m2=new Date(year,tm-1,td+1);
    if(month===m2.getMonth()+1&&day===m2.getDate())return'🧧 Mùng 2 Tết';
  }
  return null;
}

function stSetDL(tid,sid,el){
  const inp=document.createElement('input');
  inp.type='date';inp.style.cssText='font-size:11px;border:1px solid var(--p);border-radius:4px;padding:2px 4px;cursor:pointer';
  const t=db.tasks.find(t=>t.id===tid);
  const s=t?.subtasks?.find(s=>s.id===sid);
  if(s?.dl)inp.value=s.dl;
  el.replaceWith(inp);
  inp.focus();inp.showPicker?.();
  let _saved=false;
  const save=()=>{if(_saved)return;_saved=true;if(s){s.dl=inp.value;saveDB();}openTD(tid);};
  inp.addEventListener('change',save);
  inp.addEventListener('blur',save);
}
function togST(tid,sid){
  const t=db.tasks.find(t=>t.id===tid);if(!t)return;

function delST(tid,sid){

function resizeImgFile(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900,c=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.82));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

let _mentionQuery='',_mentionActive=false,_mentionSel=0,_mentionRange=null;
function mentionKey(e){
  const ed=$('cmt-ed');if(!ed)return;
  const sel=window.getSelection();if(!sel.rangeCount)return;
  const range=sel.getRangeAt(0);
  const text=range.startContainer.textContent||'';
  const pos=range.startOffset;
  const before=text.slice(0,pos);
  const atIdx=before.lastIndexOf('@');
  if(atIdx===-1||before.slice(atIdx).includes(' ')){hideMentionDrop();return;}
  _mentionQuery=before.slice(atIdx+1).toLowerCase();
  _mentionActive=true;
  const matches=db.users.filter(u=>u.name.toLowerCase().includes(_mentionQuery)||u.dept.toLowerCase().includes(_mentionQuery)).slice(0,8);
  if(!matches.length){hideMentionDrop();return;}
  _mentionRange={node:range.startContainer,pos,atIdx};
  const rect=range.getBoundingClientRect();
  showMentionDrop(matches,rect.left,rect.bottom+6);
}
function mentionNav(e){
  const drop=$('mention-drop');
  if(!drop||drop.classList.contains('hidden'))return;
  const opts=drop.querySelectorAll('.mention-opt');
  if(e.key==='ArrowDown'){e.preventDefault();_mentionSel=(_mentionSel+1)%opts.length;opts.forEach((o,i)=>o.classList.toggle('sel',i===_mentionSel));}
  else if(e.key==='ArrowUp'){e.preventDefault();_mentionSel=(_mentionSel-1+opts.length)%opts.length;opts.forEach((o,i)=>o.classList.toggle('sel',i===_mentionSel));}
  else if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();const o=opts[_mentionSel];if(o)insertMention(o.dataset.uid,o.querySelector('[style*="font-weight"]').textContent);}
  else if(e.key==='Escape'){hideMentionDrop();}
}
function showMentionDrop(users,x,y){
  const drop=$('mention-drop');if(!drop)return;
  _mentionSel=0;
  drop.innerHTML=users.map((u,i)=>`<div class="mention-opt${i===0?' sel':''}" data-uid="${u.id}"
    onmousedown="event.preventDefault();insertMention('${u.id}','${esc(u.name).replace(/'/g,"\\'")}')">
    <div class="feed-av" style="width:26px;height:26px;font-size:10px">${avL(u.name)}</div>
    <div><div style="font-weight:600;font-size:13px">${esc(u.name)}</div><div style="font-size:11px;color:var(--tx3)">${esc(u.dept)}</div></div>
  </div>`).join('');
  drop.style.left=Math.min(x,window.innerWidth-220)+'px';
  drop.style.top=Math.min(y,window.innerHeight-220)+'px';
  drop.classList.remove('hidden');
}
function hideMentionDrop(){_mentionActive=false;$('mention-drop')?.classList.add('hidden');}
function insertMention(uid_,name){
  hideMentionDrop();
  const ed=$('cmt-ed');if(!ed)return;
  const saved=_mentionRange;
  if(!saved||!saved.node)return;
  const node=saved.node;
  if(node.nodeType!==3)return;
  const text=node.textContent;
  const pos=saved.pos;
  const atIdx=saved.atIdx;
  const before_=text.slice(0,atIdx);
  const after_=text.slice(pos);
  const span=document.createElement('span');
  span.className='mention-tag';span.dataset.uid=uid_;
  span.textContent='@'+name;span.contentEditable='false';
  const after=document.createTextNode(' '+after_);
  node.textContent=before_;
  node.parentNode.insertBefore(span,node.nextSibling);
  node.parentNode.insertBefore(after,span.nextSibling);
  const newRange=document.createRange();newRange.setStartAfter(after,1);newRange.collapse(true);
  sel.removeAllRanges();sel.addRange(newRange);
  ed.focus();
}

}

function handleDescPaste(e){
  const items=e.clipboardData?.items||[];
  for(let i=0;i<items.length;i++){
    if(items[i].type.startsWith('image/')){
      e.preventDefault();
      const file=items[i].getAsFile();
      const reader=new FileReader();
      reader.onload=function(ev){
        const img=new Image();
        img.onload=function(){
          const c=document.createElement('canvas');
          const MAX=800;let w=img.width,h=img.height;
          if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
          c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          const data=c.toDataURL('image/jpeg',0.80);
          const imgEl=document.createElement('img');imgEl.src=data;
          const sel=window.getSelection();
          if(sel.rangeCount){const r=sel.getRangeAt(0);r.deleteContents();r.insertNode(imgEl);}
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
      return;
    }
  }
}

function saveTask(tid){
  const title=$('tt').value.trim();if(!title){alert('Nhập tiêu đề');return;}
  const asgn=$('ta').value;
  const pics=[...document.querySelectorAll('.pic-chk:checked')].map(c=>c.value).filter(v=>v!==asgn);
  const cv={};document.querySelectorAll('.cf-inp').forEach(e=>{cv[e.dataset.id]=e.value;});
  const prev=tid?db.tasks.find(t=>t.id===tid)?.asgn:null;
  const data={title,desc:$('td').innerHTML||'',asgn,pics,status:$('tst').value,pri:$('tp').value,dl:$('tdl').value,reqDoc:$('trd').value,cv,recur:$('trecur')?.value||''};
  let taskId=tid;
  if(tid){const t=db.tasks.find(t=>t.id===tid);if(t){stampStatus(t,t.status,data.status);Object.assign(t,data);}}
  else{const nid=uid();db.tasks.push({id:nid,...data,by:S.user.id,at:new Date().toISOString(),subtasks:[..._draftSTs],outputs:[]});taskId=nid;_draftSTs=[];}
  if(asgn&&asgn!==prev){
    addN(asgn,`📋 Bạn được giao task mới: "${title}"`,taskId);
    const u=db.users.find(u=>u.id===asgn);
    if(u)console.log('[EmailJS] Send to:',u.email,'task:',title);
  }
  pics.forEach(pid=>{if(pid!==prev)addN(pid,`📋 Bạn được thêm vào task: "${title}"`,taskId);});
  saveDB();closeMod();if(S.page==='tasks')renderTV();else renderTasks();
}
function delTask(tid){if(!confirm('Xóa task này?'))return;db.tasks=db.tasks.filter(t=>t.id!==tid);saveDB(true);closeMod();if(S.page==='tasks')renderTV();else renderTasks();}
function spawnRecur(t){
  if(!t.recur||t.recur==='')return;
  const already=db.tasks.find(x=>x.recurParent===t.id&&x.status!=='done');
  if(already)return;
  const base=new Date(t.dl||new Date());
  const step=t.recur==='daily'?1:7;
  base.setDate(base.getDate()+step);
  const today=new Date();today.setHours(0,0,0,0);
  while(base<today)base.setDate(base.getDate()+step);
  const nextDl=base.toISOString().split('T')[0];
  const nid=uid();
  db.tasks.push({
    id:nid,title:t.title,desc:t.desc,asgn:t.asgn,pics:[...(t.pics||[])],
    status:'todo',pri:t.pri,dl:nextDl,reqDoc:t.reqDoc,cv:{...(t.cv||{})},
    recur:t.recur,recurParent:t.id,by:t.by,at:new Date().toISOString(),
    subtasks:(t.subtasks||[]).map(s=>({...s,id:uid(),done:false})),
    outputs:[],startedAt:null,doneAt:null
  });
  if(t.asgn)addN(t.asgn,`🔁 Task lặp lại: "${t.title}" — hạn ${fmtD(nextDl)}`,nid);
  saveDB();
}

function addModalST(tid){
  const tx=$('mst-inp')?.value.trim(),asgn=$('mst-asgn')?.value||'',dl=$('mst-dl')?.value||'';
  if(!tx)return;
  if(tid){const t=db.tasks.find(t=>t.id===tid);if(t){if(!t.subtasks)t.subtasks=[];t.subtasks.push({id:uid(),tx,done:false,asgn,dl});saveDB();}}
  else _draftSTs.push({id:uid(),tx,done:false,asgn,dl});
  // Chỉ update danh sách subtask, không re-render toàn modal
  _renderModalSTList(tid);
  if($('mst-inp'))$('mst-inp').value='';
  if($('mst-asgn'))$('mst-asgn').value='';
  if($('mst-dl'))$('mst-dl').value='';
  $('mst-inp')?.focus();
}
function delModalST(idx,tid){
  if(tid){const t=db.tasks.find(t=>t.id===tid);if(t){t.subtasks.splice(idx,1);saveDB();}}
  else _draftSTs.splice(idx,1);
  _renderModalSTList(tid);
}

function savePerm(uid_){
  const u=db.users.find(u=>u.id===uid_);if(!u)return;
  const scope=u.permScope||'docs';
  if(scope==='all'){
    db.docs.forEach(d=>{if(!d.asgn.includes(uid_))d.asgn.push(uid_);});
  } else if(scope==='cats'){
    const selCats=[...document.querySelectorAll('.pm-chk[data-cat]:checked')].map(c=>c.dataset.cat);
    u.permCats=selCats;
    db.docs.forEach(d=>{d.asgn=d.asgn.filter(i=>i!==uid_);});
    db.docs.filter(d=>selCats.includes(d.cat)).forEach(d=>{if(!d.asgn.includes(uid_))d.asgn.push(uid_);});
  } else {
    document.querySelectorAll('.pm-chk[data-did]').forEach(cb=>{
      const d=db.docs.find(d=>d.id===cb.dataset.did);if(!d)return;
      if(cb.checked&&!d.asgn.includes(uid_))d.asgn.push(uid_);
      if(!cb.checked)d.asgn=d.asgn.filter(i=>i!==uid_);
    });
  }
  saveDB();closeMod();
  if(S.page==='perm')renderPermPage();else renderPersonnel();
  addN(uid_,'🔑 Quyền truy cập tài liệu của bạn vừa được cập nhật.',null,'docs');
}

async function doBackup(){
  const from=$('bk-from').value,to=$('bk-to').value,sn=$('bk-sheet').value||'Backup';
  if(!from||!to){alert('Chọn khoảng thời gian!');return;}
  const arr=db.tasks.filter(t=>t.dl&&t.dl>=from&&t.dl<=to);
  if(!arr.length){alert('Không có task trong khoảng này!');return;}
  const stM={todo:'To-Do',inprogress:'Đang làm',done:'Hoàn thành'};
  const prM={high:'Cao',med:'Trung bình',low:'Thấp'};
  const payload={sheetName:sn,tasks:arr.map(t=>({
    id:t.id,title:t.title,desc:t.desc||'',assignee:uName(t.asgn||''),
    status:stM[t.status]||t.status,priority:prM[t.pri]||t.pri,
    deadline:t.dl||'',createdAt:(t.at||'').split('T')[0],doneAt:(t.doneAt||'').split('T')[0]
  }))};
  const btn=$('bk-btn');if(btn){btn.disabled=true;btn.textContent='⏳ Đang gửi...';}
  try{
    const res=await fetch(db.cfg.gsheetsUrl,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain'}});
    const json=await res.json();
    if(json.ok){closeMod();alert('\u2705 Backup '+json.count+' task lên "'+sn+'" thành công!');}
    else alert('Lỗi Apps Script: '+(json.error||'?'));
  }catch(err){
    alert('Không kết nối được.\n1. Kiểm tra URL\n2. Deploy quyền "Anyone"\n\n'+err.message);
  }finally{if(btn){btn.disabled=false;btn.textContent='📤 Backup';}}
}

  $('ov').classList.add('on');
}
function closeMod(){$('ov').classList.remove('on');}
function ovClick(e){if(e.target===$('ov'))closeMod();}
function renderNBadge(){
  const n=db.notifs.filter(x=>x.uid===S.user?.id&&!x.read).length;
  const b=$('nbbadge');if(!b)return;
  b.textContent=n>9?'9+':n;b.classList.toggle('on',n>0);
}
function toggleNP(){const p=$('np');p.classList.toggle('on');if(p.classList.contains('on'))renderNP();}
function renderNP(){
  const ns=db.notifs.filter(n=>n.uid===S.user.id).sort((a,b)=>new Date(b.at)-new Date(a.at));
  const c=$('np-list');
  if(!ns.length){c.innerHTML=`<div class="ne">🔔<br>Không có thông báo</div>`;return;}
  c.innerHTML=ns.map(n=>{
    const hasDest=n.tid||n.pg;
    return`<div class="nit${!n.read?' unread':''}${hasDest?' clickable':''}" onclick="notifClick('${n.id}')">
      <div class="ni-msg">${esc(n.msg)}${hasDest?`<span class="ni-go">→</span>`:''}</div>
      <div class="ni-time">${fmtDT(n.at)}</div>
    </div>`
  }).join('');
}
function notifClick(nid){
  const n=db.notifs.find(n=>n.id===nid);if(!n)return;
  n.read=true;saveDB();
  $('np').classList.remove('on');
  renderNBadge();renderNP();
  if(n.tid){
    navigate('tasks');
    setTimeout(()=>openTD(n.tid),150);
  } else if(n.pg){
    navigate(n.pg);
  }
}
function markAllRead(){db.notifs.filter(n=>n.uid===S.user.id).forEach(n=>n.read=true);saveDB();renderNBadge();renderNP();}
function doSearch(q){
  q=q.trim().toLowerCase();if(!q){renderPg(S.page);return;}
  const ts=myTasks('dl','',q),ds=isAdm()?db.docs.filter(d=>d.title.toLowerCase().includes(q)):db.docs.filter(d=>d.asgn.includes(S.user.id)&&d.title.toLowerCase().includes(q));
  let h=`<div class="ph"><div class="ph-l"><h1>Kết quả: "${esc(q)}"</h1><p>${ts.length} task, ${ds.length} tài liệu</p></div></div>`;
  h+=`<div class="fw7 mb6">Nhiệm vụ</div>`;
  if(!ts.length)h+=`<p class="c3 f12 mb14">Không tìm thấy.</p>`;
  else ts.forEach(t=>{const ov=isOvd(t.dl)&&t.status!=='done';h+=`<div class="ti p-${t.pri[0]}"><div class="chk${t.status==='done'?' done':''}">${t.status==='done'?'✓':''}</div><div class="tm"><div class="t-ttl">${esc(t.title)}</div><div class="t-inf">${stBadge(t.status)}${priBadge(t.pri)}${t.recur?'<span class="recur-badge">🔁 '+(t.recur==='daily'?'Ngày':'Tuần')+'</span>':''}<span class="t-dl${ov?' ovd':''}">📅 ${fmtD(t.dl)}${ov?` <b style="font-size:10px;color:#EF4444">Quá hạn ${Math.floor((new Date()-new Date(t.dl))/86400000)}n</b>`:''}</span></div></div><button class="btn btn-g btn-sm" onclick="openTD('${t.id}')">Chi tiết</button></div>`;});
  h+=`<div class="fw7 mb6 mt14">Tài liệu</div>`;
  if(!ds.length)h+=`<p class="c3 f12">Không tìm thấy.</p>`;
  else h+=`<div class="dg">${ds.map(d=>{const dn=d.done.includes(S.user.id);return`<div class="dc${dn?' ok':' pend'}" onclick="openDocView('${d.id}')"><div class="dc-ic">📑</div><div class="dc-ttl">${esc(d.title)}</div><div class="dc-cat">${esc(d.cat)}</div>${dn?'<span class="b b-ok">✓ Đã đọc</span>':'<span class="b b-w">Chưa đọc</span>'}</div>`;}).join('')}</div>`;
  $('cnt').innerHTML=h;
}
// ─── BULK IMPORT ───────────────────────────────────────────────────────────────
let _importRows=[];
function downloadTemplate(){
  const hdr='Tiêu đề,Mô tả,Người phụ trách (tên hoặc SĐT),Hạn chót (YYYY-MM-DD),Ưu tiên (cao/trung/thấp),Trạng thái (todo/inprogress/done)';
  const ex='Thiết kế logo,Tạo logo sản phẩm mới,Nguyễn Văn A,2026-07-15,cao,todo\nViết báo cáo tháng,Báo cáo doanh thu tháng 6,0901234567,2026-06-30,trung,inprogress';
  const blob=new Blob(['﻿'+hdr+'\n'+ex],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='task_template.csv';a.click();
}
function openImportMod(){
  _importRows=[];
  openMod('import','📥','Import Task hàng loạt',
    `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:10px 14px;background:#F8FAFC;border-radius:8px;border:1px solid var(--bdr)">
      <span style="font-size:20px">📋</span>
      <div style="flex:1;font-size:12px;color:var(--tx2)">Tải file mẫu về, điền danh sách task, rồi upload lên đây.</div>
      <button class="btn btn-g btn-sm" onclick="downloadTemplate()">⬇️ File mẫu</button>
    </div>
    <div id="imp-drop" style="position:relative;border:2px dashed var(--bdr);border-radius:10px;padding:32px 20px;text-align:center;cursor:pointer;transition:.2s" ondragover="event.preventDefault();this.style.borderColor='var(--p)';this.style.background='var(--pl)'" ondragleave="this.style.borderColor='';this.style.background=''" ondrop="handleImpDrop(event)">
      <input type="file" accept=".csv,.xlsx,.xls" onchange="handleImportFile(this.files[0])" style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer" />
      <div style="font-size:36px;margin-bottom:8px">📁</div>
      <div style="font-weight:700;font-size:14px;color:var(--tx)">Kéo thả hoặc click để chọn file</div>
      <div style="font-size:12px;color:var(--tx3);margin-top:4px">Hỗ trợ: .csv · .xlsx · .xls (tối đa 500 dòng)</div>
    </div>
    <div id="imp-info" style="margin-top:10px;min-height:18px;font-size:12px"></div>
    <div id="imp-preview" style="margin-top:10px;overflow-x:auto;max-height:280px;overflow-y:auto;border-radius:8px"></div>`,
    `<button class="btn btn-s" onclick="closeMod()">Hủy</button>
    <button class="btn btn-p" id="imp-btn" onclick="doImport()" style="display:none">✅ Xác nhận Import</button>`,
    true);
}
function handleImpDrop(e){
  e.preventDefault();
  const d=e.currentTarget;d.style.borderColor='';d.style.background='';
  const f=e.dataTransfer.files[0];if(f)handleImportFile(f);
}
function handleImportFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  $('imp-info').innerHTML='<span style="color:var(--tx3)">⏳ Đang đọc file...</span>';
  const rdr=new FileReader();
  rdr.onload=function(ev){
    let rows=[];
    try{
      if(ext==='csv'){rows=parseImpCSV(ev.target.result);}
      else if(ext==='xlsx'||ext==='xls'){
        if(typeof XLSX==='undefined'){$('imp-info').innerHTML='<span style="color:var(--err)">⚠️ Thư viện Excel chưa tải xong, thử lại sau 2 giây.</span>';return;}
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''}).filter(r=>r.some(c=>String(c).trim()!==''));
      } else {$('imp-info').innerHTML='<span style="color:var(--err)">Chỉ hỗ trợ .csv, .xlsx, .xls</span>';return;}
    }catch(err){$('imp-info').innerHTML=`<span style="color:var(--err)">Lỗi đọc file: ${err.message}</span>`;return;}
    previewImport(rows,file.name);
  };
  if(ext==='csv')rdr.readAsText(file,'UTF-8');
  else rdr.readAsBinaryString(file);
}
function parseImpCSV(text){
  const rows=[];
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  for(const l of lines){
    if(!l.trim())continue;
    const row=[];let cur='';let inQ=false;
    for(let i=0;i<l.length;i++){
      const c=l[i];
      if(c==='"'){if(inQ&&l[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cur.trim());cur='';}
      else cur+=c;
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}
function impResolveAsgn(val){
  if(!val)return '';
  const v=String(val).trim();
  let u=db.users.find(u=>u.phone===v||u.id===v);
  if(!u)u=db.users.find(u=>u.name.toLowerCase()===v.toLowerCase());
  if(!u&&v.length>2)u=db.users.find(u=>u.name.toLowerCase().includes(v.toLowerCase()));
  return u?u.id:'';
}
function impNormPri(v){
  if(!v)return 'medium';
  const l=String(v).toLowerCase().trim();
  if(l==='cao'||l==='high'||l==='h'||l==='1')return 'high';
  if(l==='thấp'||l==='thap'||l==='low'||l==='l'||l==='3')return 'low';
  return 'medium';
}
function impNormSt(v){
  if(!v)return 'todo';
  const l=String(v).toLowerCase().trim();
  if(l==='done'||l.includes('hoàn')||l.includes('hoan')||l==='xong')return 'done';
  if(l==='inprogress'||l==='in-progress'||l.includes('đang')||l.includes('dang'))return 'inprogress';
  return 'todo';
}
function impNormDate(v){
  if(!v&&v!==0)return '';
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(m)return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  const n=parseFloat(s);
  if(!isNaN(n)&&n>40000&&n<80000){const d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().split('T')[0];}
  return '';
}
function previewImport(rows,fname){
  if(!rows||rows.length<2){$('imp-info').innerHTML='<span style="color:var(--err)">⚠️ File trống hoặc thiếu dòng tiêu đề!</span>';return;}
  const hdr=rows[0].map(h=>String(h).toLowerCase().trim());
  const idx=k=>hdr.findIndex(h=>k.some(p=>h.includes(p)));
  const colMap={
    title:idx(['tiêu đề','tieu de','title','tên task','ten task','task']),
    desc:idx(['mô tả','mo ta','desc','ghi chú','ghi chu','note']),
    asgn:idx(['phụ trách','phu trach','assignee','người','nguoi','pic','giao cho']),
    dl:idx(['hạn','han','deadline','ngày','ngay','date','due']),
    pri:idx(['ưu tiên','uu tien','priority','pri','độ ưu','do uu']),
    st:idx(['trạng thái','trang thai','status','tình trạng','tinh trang'])
  };
  if(colMap.title<0)colMap.title=0;
  if(colMap.desc<0)colMap.desc=1;
  if(colMap.asgn<0)colMap.asgn=2;
  if(colMap.dl<0)colMap.dl=3;
  if(colMap.pri<0)colMap.pri=4;
  if(colMap.st<0)colMap.st=5;
  const data=rows.slice(1).filter(r=>r[colMap.title]&&String(r[colMap.title]).trim());
  if(!data.length){$('imp-info').innerHTML='<span style="color:var(--err)">⚠️ Không tìm thấy dòng dữ liệu hợp lệ!</span>';return;}
  _importRows=data.slice(0,500).map(r=>{
    const get=i=>i>=0&&i<r.length?String(r[i]).trim():'';
    const asgnRaw=get(colMap.asgn);
    return{title:get(colMap.title),desc:get(colMap.desc),asgn:impResolveAsgn(asgnRaw),asgnRaw,dl:impNormDate(get(colMap.dl)),pri:impNormPri(get(colMap.pri)),st:impNormSt(get(colMap.st))};
  });
  const noAsgn=_importRows.filter(r=>r.asgnRaw&&!r.asgn).length;
  const stLbl={todo:'📋 To-Do',inprogress:'⚡ Đang làm',done:'✅ Hoàn thành'};
  const prLbl={high:'🔴 Cao',medium:'🟡 Trung',low:'🟢 Thấp'};
  $('imp-info').innerHTML=`<span style="color:var(--ok);font-weight:600">✅ Tìm thấy <b>${_importRows.length}</b> task từ "${esc(fname)}"</span>${noAsgn?` <span style="color:var(--warn);margin-left:8px">⚠️ ${noAsgn} dòng không khớp nhân viên (sẽ để trống)</span>`:''}`;
  $('imp-preview').innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#F9FAFB;position:sticky;top:0">
      <th style="padding:7px 10px;border-bottom:1.5px solid var(--bdr)">#</th>
      <th style="padding:7px 10px;border-bottom:1.5px solid var(--bdr);text-align:left">Tiêu đề</th>
      <th style="padding:7px 10px;border-bottom:1.5px solid var(--bdr);text-align:left">Phụ trách</th>
      <th style="padding:7px 10px;border-bottom:1.5px solid var(--bdr);text-align:left">Hạn</th>
      <th style="padding:7px 10px;border-bottom:1.5px solid var(--bdr);text-align:left">Ưu tiên</th>
      <th style="padding:7px 10px;border-bottom:1.5px solid var(--bdr);text-align:left">Trạng thái</th>
    </tr></thead>
    <tbody>${_importRows.map((r,i)=>`<tr style="background:${i%2?'#FAFBFC':'#fff'}">
      <td style="padding:6px 10px;border-bottom:1px solid #F1F5F9;color:var(--tx3);text-align:center">${i+1}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #F1F5F9;font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.title)}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap">${r.asgn?`<span style="color:var(--ok)">✓ ${esc(uName(r.asgn))}</span>`:r.asgnRaw?`<span style="color:var(--warn)">⚠️ ${esc(r.asgnRaw)}</span>`:'<span style="color:var(--tx3)">—</span>'}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap">${r.dl||'—'}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap">${prLbl[r.pri]}</td>
      <td style="padding:6px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap">${stLbl[r.st]}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  const btn=$('imp-btn');if(btn)btn.style.display='';
}
function doImport(){
  if(!_importRows.length)return;
  const btn=$('imp-btn');if(btn){btn.disabled=true;btn.textContent='⏳ Đang import...';}
  let cnt=0;
  _importRows.forEach(r=>{
    const nid=uid();
    db.tasks.push({id:nid,title:r.title,desc:r.desc||'',asgn:r.asgn||'',pics:[],status:r.st,pri:r.pri,dl:r.dl,reqDoc:'',cv:{},recur:'',by:S.user.id,at:new Date().toISOString(),subtasks:[],outputs:[]});
    if(r.asgn){
      addN(r.asgn,`📋 Bạn được giao task mới: "${r.title}"`,nid);
      const u=db.users.find(u=>u.id===r.asgn);
      if(u)console.log('[EmailJS] Import → send to:',u.email,'task:',r.title);
    }
    cnt++;
  });
  saveDB();closeMod();
  if(S.page==='tasks')renderTV();else renderTasks();
  setTimeout(()=>alert(`✅ Đã import thành công ${cnt} task!`),80);
}
